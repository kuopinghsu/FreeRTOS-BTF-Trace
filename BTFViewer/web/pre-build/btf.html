  <body>
    <div id="open-help" style="display:none;max-width:840px;margin:40px auto;padding:16px 18px;border:1px solid #d0d7de;border-radius:8px;font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#24292f;background:#f6f8fa;">
      This is the Vite source entry page and should not be opened directly.
      Use <code>dist/index.html</code> after running <code>make</code> in <code>BTFViewer/web</code>.
    </div>
    <div id="app"></div>
    <script>
      (function () {
        const isFile = window.location.protocol === 'file:'
        const inDist = /\/dist\/(index\.html)?$/i.test(window.location.pathname)
        if (isFile && !inDist) {
          const target = './dist/index.html'
          const hint = document.getElementById('open-help')
          if (hint) hint.style.display = 'block'
          if (window.location.pathname !== '/dist/index.html') {
            window.location.replace(target)
          }
        }
      })()
    </script>
  </body>
